name: Job Tracker Automation Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      # ── Positive Tests ───────────────────────────────────────────────────
      - name: Run Positive Tests (Login + Profile)
        run: node job_tracker_automation.js

      # ── Negative Tests ───────────────────────────────────────────────────
      - name: Run Negative Tests (Invalid Login)
        run: node job_tracker_negative_test.js

      # ── Upload both reports ──────────────────────────────────────────────
      - name: Upload Positive Test Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: positive-test-report
          path: job_tracker_test_report.html

      - name: Upload Negative Test Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: negative-test-report
          path: job_tracker_negative_test_report.html
